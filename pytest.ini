[pytest]
# Pytest configuration for local research agent tests

# Minimum Python version
minversion = 8.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_scope = function

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    slow: Slow tests (mark to exclude with -m "not slow")
    asyncio: Async tests (automatically detected)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .venv __pycache__ .pytest_cache data logs
