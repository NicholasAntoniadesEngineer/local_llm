[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    memory: marks tests as memory layer tests
    retrieval: marks tests as retrieval layer tests
    rules: marks tests as rules engine tests
    agent: marks tests as agent orchestrator tests
log_cli = false
log_level = INFO
